<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Periodic Table</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --cs: 58px; /* card size – overridden by JS on mobile */
  --bg: #01020a;
  --glass: rgba(4,7,20,0.78);
  --border: rgba(255,255,255,0.08);
  --alkali:     #ff4757;
  --alkaline:   #ffa502;
  --lanthanide: #2ed573;
  --actinide:   #1e90ff;
  --transition: #00d2d3;
  --post:       #a29bfe;
  --metalloid:  #fdcb6e;
  --nonmetal:   #fd79a8;
  --halogen:    #ff6348;
  --noble:      #eccc68;
  --unknown:    #576574;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; touch-action:none; font-family:'Share Tech Mono',monospace; color:#fff; }

/* ── BACKGROUND ── */
#bgc { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }

/* ── SCENE ── */
#scene {
  position:fixed; inset:0; z-index:1;
  perspective:900px;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  cursor:grab;
}
#scene:active { cursor:grabbing; }
#world { position:relative; transform-style:preserve-3d; width:0; height:0; will-change:transform; }

/* ── ATOM ── */
.atom {
  position:absolute;
  width:var(--cs); height:var(--cs);
  transform-style:preserve-3d;
  cursor:pointer;
  transition: transform 1.12s cubic-bezier(0.34,1.08,0.64,1), opacity 0.5s ease;
  will-change:transform;
}
.face {
  position:absolute; inset:0; border-radius:8px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden;
  background: linear-gradient(145deg, color-mix(in srgb,var(--c) 10%,#01020a), #01020a 66%);
  border: 1px solid color-mix(in srgb,var(--c) 38%,transparent);
  box-shadow: 0 0 8px color-mix(in srgb,var(--c) 20%,transparent),
              0 0 1px color-mix(in srgb,var(--c) 50%,transparent) inset;
  transition: all 0.24s ease;
}
.face::after {
  content:''; position:absolute; top:0; left:0; right:0; height:42%;
  background:linear-gradient(to bottom,rgba(255,255,255,0.07),transparent);
  border-radius:8px 8px 0 0; pointer-events:none;
}
.atom:hover .face {
  background: linear-gradient(145deg, color-mix(in srgb,var(--c) 22%,#01020a), #01020a 52%);
  border-color: color-mix(in srgb,var(--c) 90%,white);
  box-shadow: 0 0 22px color-mix(in srgb,var(--c) 65%,transparent),
              0 0 55px color-mix(in srgb,var(--c) 28%,transparent),
              0 0 2px  color-mix(in srgb,var(--c) 85%,transparent) inset;
}
.atom.dim { opacity:0.04 !important; pointer-events:none !important; }

.a-num  { font-size:8px;  color:var(--c); opacity:.50; line-height:1; margin-top:4px; }
.a-sym  { font-family:'Orbitron',sans-serif; font-weight:700; color:var(--c); line-height:1.05; }
.a-name { font-size:6px;  color:var(--c); opacity:.55; text-align:center; padding:0 2px; line-height:1.2; }
.a-mass { font-size:6px;  color:var(--c); opacity:.32; }
.sym1 .a-sym { font-size:20px; }
.sym2 .a-sym { font-size:17px; }
.sym3 .a-sym { font-size:13px; }


#ui-desktop {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; flex-direction:column; align-items:center;
  padding:10px 12px 0; gap:5px; pointer-events:none;
}
#logo {
  font-family:'Orbitron',sans-serif;
  font-size:10px; letter-spacing:5px;
  color:rgba(255,255,255,0.16); text-transform:uppercase; pointer-events:none;
  margin-top:4px;
}
.dbar {
  display:flex; flex-wrap:wrap; gap:5px; justify-content:center;
  pointer-events:all;
  background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:40px; padding:6px 10px;
}
.mbtn {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:1.5px; padding:6px 14px; border-radius:30px;
  border:1px solid rgba(255,255,255,0.1); background:transparent;
  color:rgba(255,255,255,0.38); cursor:pointer;
  transition:all 0.2s; text-transform:uppercase; white-space:nowrap;
}
.mbtn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }
.mbtn.on { color:#fff; border-color:rgba(255,255,255,0.42); background:rgba(255,255,255,0.09); box-shadow:0 0 10px rgba(255,255,255,0.08); }
.fbtn {
  font-family:'Share Tech Mono',monospace; font-size:8px; padding:3px 9px;
  border-radius:20px; border:1px solid transparent; cursor:pointer;
  transition:all 0.18s; opacity:0.4; background:transparent; white-space:nowrap;
}
.fbtn.on, .fbtn:hover { opacity:1; }
.fbtn[data-f=all]       { color:#fff;              border-color:rgba(255,255,255,0.25); }
.fbtn[data-f=alkali]    { color:var(--alkali);      border-color:var(--alkali); }
.fbtn[data-f=alkaline]  { color:var(--alkaline);    border-color:var(--alkaline); }
.fbtn[data-f=transition]{ color:var(--transition);  border-color:var(--transition); }
.fbtn[data-f=lanthanide]{ color:var(--lanthanide);  border-color:var(--lanthanide); }
.fbtn[data-f=actinide]  { color:var(--actinide);    border-color:var(--actinide); }
.fbtn[data-f=post]      { color:var(--post);        border-color:var(--post); }
.fbtn[data-f=metalloid] { color:var(--metalloid);   border-color:var(--metalloid); }
.fbtn[data-f=nonmetal]  { color:var(--nonmetal);    border-color:var(--nonmetal); }
.fbtn[data-f=halogen]   { color:var(--halogen);     border-color:var(--halogen); }
.fbtn[data-f=noble]     { color:var(--noble);       border-color:var(--noble); }

/* Desktop search + zoom */
#d-right {
  position:fixed; top:50%; right:14px; transform:translateY(-50%);
  z-index:50; display:flex; flex-direction:column; gap:6px; align-items:center;
}
#d-srch {
  font-family:'Share Tech Mono',monospace; font-size:11px;
  padding:7px 10px; width:130px;
  background:var(--glass); backdrop-filter:blur(12px);
  border:1px solid var(--border); border-radius:8px; color:#fff; outline:none;
  transition:border-color 0.2s, width 0.25s;
}
#d-srch::placeholder { color:rgba(255,255,255,0.25); }
#d-srch:focus { border-color:rgba(255,255,255,0.3); width:160px; }
.zbtn {
  width:32px; height:32px; background:var(--glass); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:8px;
  color:rgba(255,255,255,0.5); font-size:17px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.18s; user-select:none;
}
.zbtn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }


#ui-mobile {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  padding: 0 0 env(safe-area-inset-bottom,0px);
}

/* Bottom sheet */
#bottom-sheet {
  background:var(--glass); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:8px 0 6px;
}

/* Drag handle */
#bhandle {
  width:36px; height:4px; border-radius:2px;
  background:rgba(255,255,255,0.2); margin:0 auto 8px;
}

/* Horizontal scroll for modes */
#m-scroll { overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding:0 12px 4px; }
#m-scroll::-webkit-scrollbar { display:none; }
#m-bar { display:inline-flex; gap:5px; white-space:nowrap; min-width:max-content; }

.m-mbtn {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:1px; padding:7px 14px; border-radius:30px;
  border:1px solid rgba(255,255,255,0.1); background:transparent;
  color:rgba(255,255,255,0.4); cursor:pointer;
  transition:all 0.2s; text-transform:uppercase; white-space:nowrap;
}
.m-mbtn:hover, .m-mbtn.on { color:#fff; border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.1); }

/* divider */
.m-div { height:1px; background:var(--border); margin:6px 0; }

/* Horizontal scroll for filters */
#f-scroll { overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding:0 12px 6px; }
#f-scroll::-webkit-scrollbar { display:none; }
#f-bar { display:inline-flex; gap:5px; white-space:nowrap; min-width:max-content; }

.m-fbtn {
  font-family:'Share Tech Mono',monospace; font-size:8px;
  padding:5px 10px; border-radius:20px; border:1px solid transparent;
  cursor:pointer; transition:all 0.18s; opacity:0.42; background:transparent; white-space:nowrap;
}
.m-fbtn.on, .m-fbtn:hover { opacity:1; }
.m-fbtn[data-f=all]       { color:#fff;              border-color:rgba(255,255,255,0.25); }
.m-fbtn[data-f=alkali]    { color:var(--alkali);      border-color:var(--alkali); }
.m-fbtn[data-f=alkaline]  { color:var(--alkaline);    border-color:var(--alkaline); }
.m-fbtn[data-f=transition]{ color:var(--transition);  border-color:var(--transition); }
.m-fbtn[data-f=lanthanide]{ color:var(--lanthanide);  border-color:var(--lanthanide); }
.m-fbtn[data-f=actinide]  { color:var(--actinide);    border-color:var(--actinide); }
.m-fbtn[data-f=post]      { color:var(--post);        border-color:var(--post); }
.m-fbtn[data-f=metalloid] { color:var(--metalloid);   border-color:var(--metalloid); }
.m-fbtn[data-f=nonmetal]  { color:var(--nonmetal);    border-color:var(--nonmetal); }
.m-fbtn[data-f=halogen]   { color:var(--halogen);     border-color:var(--halogen); }
.m-fbtn[data-f=noble]     { color:var(--noble);       border-color:var(--noble); }

/* Mobile top logo */
#m-logo {
  position:fixed; top:12px; left:0; right:0; z-index:50;
  text-align:center; pointer-events:none;
  font-family:'Orbitron',sans-serif; font-size:8px; letter-spacing:4px;
  color:rgba(255,255,255,0.15); text-transform:uppercase;
}

/* Mobile zoom */
#m-zoom {
  position:fixed; top:50%; left:12px; transform:translateY(-50%);
  z-index:50; display:flex; flex-direction:column; gap:5px;
}

/* ══════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════ */
#tip {
  position:fixed; z-index:60; pointer-events:none;
  background:rgba(2,4,15,0.93); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  border-radius:16px; padding:14px 20px 12px; text-align:center;
  opacity:0; transition:opacity 0.22s, transform 0.22s;
  border:1px solid rgba(255,255,255,0.09);
  min-width:180px; max-width:min(300px,88vw);
}
/* Desktop: side tooltip */
@media(min-width:769px) {
  #tip { top:50%; right:160px; transform:translateY(-50%) translateX(8px); }
  #tip.show { opacity:1; transform:translateY(-50%) translateX(0); }
}
/* Mobile: bottom tooltip above bottom sheet */
@media(max-width:768px) {
  #tip { bottom:160px; left:50%; transform:translateX(-50%) translateY(8px); }
  #tip.show { opacity:1; transform:translateX(-50%) translateY(0); }
}
#tsym  { font-family:'Orbitron',sans-serif; font-size:clamp(22px,5vw,34px); font-weight:900; line-height:1; }
#tname { font-size:clamp(12px,3vw,15px); margin:4px 0 2px; opacity:.88; }
#tsub  { font-size:clamp(7px,1.8vw,9px); opacity:.4; letter-spacing:1.5px; margin-bottom:9px; }
#tstats { display:flex; gap:14px; justify-content:center; border-top:1px solid rgba(255,255,255,0.08); padding-top:9px; }
.ts { display:flex; flex-direction:column; align-items:center; gap:2px; }
.ts-l { font-size:7px; opacity:.35; text-transform:uppercase; letter-spacing:1px; }
.ts-v { font-family:'Orbitron',sans-serif; font-size:10px; font-weight:600; }

/* ══════════════════════════════════════════
   RESPONSIVE VISIBILITY
══════════════════════════════════════════ */
@media(min-width:769px) {
  #ui-mobile { display:none; }
  #m-logo    { display:none; }
  #m-zoom    { display:none; }
}
@media(max-width:768px) {
  #ui-desktop { display:none; }
  #d-right    { display:none; }
}
</style>
</head>

<div id="ui-mobile">

      <button class="m-fbtn on"  data-f="all">All</button>

      <button class="m-fbtn"     data-f="metalloid">Metalloid</button>
      <button class="m-fbtn"     data-f="nonmetal">Nonmetal</button>
      <button class="m-fbtn"     data-f="halogen">Halogen</button>
      <button class="m-fbtn"     data-f="noble">Noble Gas</button>
    </div></div>
  </div>
</div>

<!-- ══ SCENE ══ -->
<div id="scene"><div id="world"></div></div>

<!-- ══ TOOLTIP ══ -->
<div id="tip">
  <div id="tsym"></div>
  <div id="tname"></div>
  <div id="tsub"></div>
  <div id="tstats">
    <div class="ts"><div class="ts-l">Mass</div><div class="ts-v" id="tmass"></div></div>
    <div class="ts"><div class="ts-l">Group</div><div class="ts-v" id="tgroup"></div></div>
    <div class="ts"><div class="ts-l">Period</div><div class="ts-v" id="tperiod"></div></div>
    <div class="ts"><div class="ts-l">№</div><div class="ts-v" id="tnum"></div></div>
  </div>
</div>

const CLR={
  alkali:'#ff4757',alkaline:'#ffa502',lanthanide:'#2ed573',
  actinide:'#1e90ff',transition:'#00d2d3',post:'#a29bfe',
  metalloid:'#fdcb6e',nonmetal:'#fd79a8',halogen:'#ff6348',
  noble:'#eccc68',unknown:'#576574'
};

/* ══════════════ DETECT DEVICE ══════════════ */
const isMobile = () => window.innerWidth <= 768;

function setCardSize() {
  const w = window.innerWidth;
  let cs;
  if (w <= 360)      cs = 40;
  else if (w <= 480) cs = 46;
  else if (w <= 768) cs = 50;
  else               cs = 58;
  document.documentElement.style.setProperty('--cs', cs + 'px');
  return cs;
}

/* ══════════════ STAR BACKGROUND ══════════════ */
(()=>{
  const cv=document.getElementById('bgc'), cx=cv.getContext('2d');
  let W,H,stars=[];
  const resize=()=>{
    W=cv.width=innerWidth; H=cv.height=innerHeight;
    stars=Array.from({length:180},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.3+.2,
      a:Math.random()*.4, da:(Math.random()-.5)*.004,
      max:Math.random()*.5+.08
    }));
  };
  const draw=()=>{
    cx.clearRect(0,0,W,H);
    [{x:.2,y:.3,r:W*.38,c:'rgba(30,144,255,.022)'},{x:.8,y:.7,r:W*.32,c:'rgba(140,60,255,.018)'},{x:.5,y:.05,r:W*.25,c:'rgba(0,210,211,.015)'}]
      .forEach(({x,y,r,c})=>{ const g=cx.createRadialGradient(x*W,y*H,0,x*W,y*H,r); g.addColorStop(0,c); g.addColorStop(1,'transparent'); cx.fillStyle=g; cx.fillRect(0,0,W,H); });
    stars.forEach(s=>{
      s.a+=s.da; if(s.a<0||s.a>s.max)s.da*=-1; s.a=Math.max(0,Math.min(s.max,s.a));
      cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fillStyle=`rgba(255,255,255,${s.a})`; cx.fill();
    });
    requestAnimationFrame(draw);
  };
  addEventListener('resize',resize); resize(); draw();
})();

/* ══════════════ BUILD CARDS ══════════════ */
const world=document.getElementById('world');
const nodes=EL.map((el,i)=>{
  const color=CLR[el.cat]||'#576574';
  const sc=el.s.length===1?'sym1':el.s.length===2?'sym2':'sym3';
  const nm=el.name.length>11?el.name.slice(0,10)+'…':el.name;
  const d=document.createElement('div');
  d.className=`atom ${sc}`; d.style.cssText=`--c:${color}`;
  d.innerHTML=`<div class="face">
    <div class="a-num">${el.n}</div>
    <div class="a-sym">${el.s}</div>
    <div class="a-name">${nm}</div>
    <div class="a-mass">${el.mass}</div>
  </div>`;
  d.addEventListener('pointerenter',()=>showTip(el,color));
  d.addEventListener('pointerleave',hideTip);
  d.addEventListener('click',()=>showTip(el,color));
  world.appendChild(d);
  return{d,el,i};
});

/* ══════════════ TOOLTIP ══════════════ */
const tipEl=document.getElementById('tip');
let tipT;
function showTip(el,color){
  clearTimeout(tipT);
  tipEl.style.color=color;
  tipEl.style.borderColor=`color-mix(in srgb,${color} 30%,transparent)`;
  document.getElementById('tsym').textContent=el.s;
  document.getElementById('tname').textContent=el.name;
  document.getElementById('tsub').textContent=el.cat.replace(/([a-z])([A-Z])/g,'$1 $2').toUpperCase()+' · №'+el.n;
  document.getElementById('tmass').textContent=el.mass;
  document.getElementById('tgroup').textContent=el.c;
  document.getElementById('tperiod').textContent=el.r>7?(el.cat==='lanthanide'?'Ln':'Ac'):el.r;
  document.getElementById('tnum').textContent=el.n;
  tipEl.classList.add('show');
}
function hideTip(){tipT=setTimeout(()=>tipEl.classList.remove('show'),700);}

/* ══════════════ LAYOUTS ══════════════ */
function CS(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cs'))||58; }

function pos_table(){
  const s=CS()+3;
  return nodes.map(({el})=>{
    let row=el.r,col=el.c;
    if(el.r===8)row=8.9; if(el.r===9)row=9.9;
    return{x:(col-9.5)*s, y:(row-5.2)*s, z:0};
  });
}
function pos_sphere(){
  const n=EL.length, R=Math.max(290,CS()*5.1);
  return nodes.map(({i})=>{
    const phi=Math.acos(1-2*(i+.5)/n), theta=Math.PI*(1+Math.sqrt(5))*(i+.5);
    return{x:R*Math.sin(phi)*Math.cos(theta), y:R*Math.sin(phi)*Math.sin(theta), z:R*Math.cos(phi)};
  });
}
function pos_helix(){
  const s=CS()+3, R=190;
  return nodes.map(({i})=>{
    const t=(i/EL.length)*Math.PI*8;
    return{x:R*Math.cos(t), y:(i-59)*s*.54, z:R*Math.sin(t)};
  });
}
function pos_grid(){
  const s=CS()+6, cols=10,rows=6,deps=2;
  return nodes.map(({i})=>({
    x:((i%cols)-(cols-1)/2)*s,
    y:((Math.floor(i/cols)%rows)-(rows-1)/2)*s,
    z:((Math.floor(i/(cols*rows))%deps)-(deps-1)/2)*s*2
  }));
}
function pos_wave(){
  const s=CS()+4, cols=12;
  return nodes.map(({i})=>{
    const col=i%cols, row=Math.floor(i/cols), t=col*.6+row*.3;
    return{x:(col-cols/2+.5)*s, y:(row-5)*s+Math.sin(t)*s*1.8, z:Math.cos(t*.8)*s*1.6};
  });
}
function pos_galaxy(){
  const arms=3;
  return nodes.map(({i})=>{
    const arm=i%arms, j=Math.floor(i/arms), total=Math.ceil(EL.length/arms);
    const t=(j/total)*Math.PI*2.5, R=80+t*52, angle=t+(arm*Math.PI*2/arms);
    const y=(arm===1?1:-1)*(j%7)*6-(arm===0?(j%5)*4:0);
    return{x:R*Math.cos(angle), y, z:R*Math.sin(angle)};
  });
}
function pos_cube(){
  const s=CS()+6, n=5;
  return nodes.map(({i})=>({
    x:((i%n)-2)*s, y:((Math.floor(i/n)%n)-2)*s, z:((Math.floor(i/(n*n)))-2)*s
  }));
}
function pos_dna(){
  const s=CS()+2, R=150, turns=5;
  return nodes.map(({i})=>{
    const strand=i%2, j=Math.floor(i/2), total=Math.ceil(EL.length/2);
    const t=(j/total)*Math.PI*2*turns, angle=t+(strand?Math.PI:0);
    return{x:R*Math.cos(angle), y:(j-total/2)*s*.72+(strand?s*.36:0), z:R*Math.sin(angle)};
  });
}

const MODES={table:pos_table,sphere:pos_sphere,helix:pos_helix,
  grid:pos_grid,wave:pos_wave,galaxy:pos_galaxy,cube:pos_cube,dna:pos_dna};

// Default scale per mode — auto-adjusted for mobile
const MSCALE={table:.62,sphere:1,helix:.88,grid:.82,wave:.82,galaxy:.78,cube:1,dna:.95};

/* ══════════════ STATE & RENDER ══════════════ */
let curMode='table', curFilter='all', curSearch='';

function render(){
  const pos=MODES[curMode]();
  nodes.forEach(({d,el},i)=>{
    const{x,y,z}=pos[i];
    d.style.transform=`translate3d(calc(${x}px - 50%),calc(${y}px - 50%),${z}px)`;
    const fOk=curFilter==='all'||el.cat===curFilter;
    const q=curSearch.toLowerCase();
    const sOk=!q||el.s.toLowerCase().includes(q)||el.name.toLowerCase().includes(q)||String(el.n).includes(q);
    if(fOk&&sOk){d.style.opacity='1';d.style.pointerEvents='auto';d.classList.remove('dim');}
    else{d.style.opacity='0.04';d.style.pointerEvents='none';d.classList.add('dim');}
  });
}

/* ══════════════ ROTATION / DRAG ══════════════ */
let rotX=-16, rotY=0, sc=MSCALE.table;
let drag=false, lx=0, ly=0, vx=0, vy=0;
let autoR=true, autoT;

function applyTf(){
  world.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(${sc},${sc},${sc})`;
}
function stopAuto(){ autoR=false; clearTimeout(autoT); autoT=setTimeout(()=>{autoR=true;},4500); }
function setMode(mode){
  curMode=mode;
  // scale smaller on mobile
  const base=MSCALE[mode]||1;
  sc = isMobile() ? base*0.75 : base;
  applyTf(); render();
}

/* Mouse */
const scene=document.getElementById('scene');
scene.addEventListener('mousedown',e=>{
  // ignore if clicking UI elements
  if(e.target.closest('#ui-desktop,#d-right'))return;
  drag=true; lx=e.clientX; ly=e.clientY; vx=vy=0; stopAuto();
});
addEventListener('mousemove',e=>{
  if(!drag)return;
  vx=(e.clientY-ly)*.27; vy=(e.clientX-lx)*.27;
  rotX+=vx; rotY+=vy; lx=e.clientX; ly=e.clientY; applyTf();
});
addEventListener('mouseup',()=>drag=false);
scene.addEventListener('wheel',e=>{
  e.preventDefault();
  sc=Math.min(4,Math.max(.2,sc*(1-e.deltaY*.001))); applyTf();
},{passive:false});

/* Touch */
let pinch0=0, tlx=0, tly=0, touchDragging=false;
scene.addEventListener('touchstart',e=>{
  if(e.target.closest('#ui-mobile'))return;
  e.preventDefault(); stopAuto();
  if(e.touches.length===1){
    tlx=e.touches[0].clientX; tly=e.touches[0].clientY; touchDragging=true;
  } else if(e.touches.length===2){
    touchDragging=false;
    pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                      e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});
scene.addEventListener('touchmove',e=>{
  if(e.target.closest('#ui-mobile'))return;
  e.preventDefault();
  if(e.touches.length===1&&touchDragging){
    rotX+=(e.touches[0].clientY-tly)*.35;
    rotY+=(e.touches[0].clientX-tlx)*.35;
    tlx=e.touches[0].clientX; tly=e.touches[0].clientY; applyTf();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    sc=Math.min(4,Math.max(.2,sc*d/pinch0)); pinch0=d; applyTf();
  }
},{passive:false});
scene.addEventListener('touchend',e=>{
  touchDragging=false;
  if(!e.touches.length) autoT=setTimeout(()=>autoR=true,4500);
});

/* Zoom buttons */
function zoom(dir){ sc=Math.min(4,Math.max(.2,dir>0?sc*1.18:sc/1.18)); applyTf(); }
document.getElementById('dZin').addEventListener('click',()=>zoom(1));
document.getElementById('dZout').addEventListener('click',()=>zoom(-1));
document.getElementById('mZin').addEventListener('click',()=>zoom(1));
document.getElementById('mZout').addEventListener('click',()=>zoom(-1));

/* RAF loop */
(function loop(){
  if(!drag&&!touchDragging){
    if(autoR){rotY+=.12;applyTf();}
    else{vx*=.9;vy*=.9;if(Math.abs(vx)>.005||Math.abs(vy)>.005){rotX+=vx;rotY+=vy;applyTf();}}
  }
  requestAnimationFrame(loop);
})();

/* ══════════════ CONTROLS WIRING ══════════════ */
// Desktop mode buttons
document.querySelectorAll('#d-mode .mbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#d-mode .mbtn, #m-bar .m-mbtn').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll(`[data-mode="${b.dataset.mode}"]`).forEach(x=>x.classList.add('on'));
  setMode(b.dataset.mode);
}));
// Mobile mode buttons
document.querySelectorAll('#m-bar .m-mbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#d-mode .mbtn, #m-bar .m-mbtn').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll(`[data-mode="${b.dataset.mode}"]`).forEach(x=>x.classList.add('on'));
  setMode(b.dataset.mode);
}));

// Desktop filter buttons
document.querySelectorAll('#d-filter .fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#d-filter .fbtn, #f-bar .m-fbtn').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll(`[data-f="${b.dataset.f}"]`).forEach(x=>x.classList.add('on'));
  curFilter=b.dataset.f; render();
}));
// Mobile filter buttons
document.querySelectorAll('#f-bar .m-fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#d-filter .fbtn, #f-bar .m-fbtn').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll(`[data-f="${b.dataset.f}"]`).forEach(x=>x.classList.add('on'));
  curFilter=b.dataset.f; render();
}));

// Search
document.getElementById('d-srch').addEventListener('input',e=>{
  curSearch=e.target.value.trim(); render();
});

setCardSize();
window.addEventListener('resize',()=>{ setCardSize(); render(); });
// mobile: start smaller
if(isMobile()) sc = MSCALE.table * 0.75;
applyTf();
render();
</script>

        color: #00ffcc; text-decoration: none; font-size: 12px; font-weight: bold;
        display: flex; align-items: center; gap: 6px; padding: 8px 14px;
        border: 1px solid transparent; border-radius: 4px; transition: all 0.25s ease; white-space: nowrap;
    }
    .cyber-node:hover, .cyber-node:active { background: rgba(0, 255, 204, 0.12); border-color: #00ffcc; text-shadow: 0 0 6px #00ffcc; }
    .cyber-core { width: 6px; height: 6px; background: #2a3a3a; border-radius: 50%; display: inline-block; }
    
    .cyber-node.active { color: #fff; border-color: #ff007f; background: rgba(255, 0, 127, 0.1); box-shadow: 0 0 10px rgba(255, 0, 127, 0.25); text-shadow: 0 0 5px #ff007f; }
    .cyber-node.active .cyber-core { background: #00ff00; box-shadow: 0 0 8px #00ff00; animation: cyber-pulse 1.5s infinite; }

    .cyber-hud-btn {
        background: transparent; border: 1px solid #ffaa00; color: #ffaa00;
        padding: 8px 12px; font-family: 'Courier New', Courier, monospace; font-size: 11px;
        font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.2s ease; touch-action: manipulation;
    }
    .cyber-hud-btn:hover, .cyber-hud-btn:active, .cyber-hud-btn.hud-on { background: rgba(255, 170, 0, 0.2); box-shadow: 0 0 12px #ffaa00; text-shadow: 0 0 5px #ffaa00; }

    .cyber-scan-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999998;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 100, 0.06) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        background-size: 100% 4px, 6px 100%; opacity: 0; transition: opacity 0.4s ease;
    }
    body.hud-active .cyber-scan-overlay { opacity: 1; animation: matrix-flicker 0.15s infinite; }

    /* АДАПТИВНАЯ ВЫДВИЖНАЯ ПАНЕЛЬ ДЛЯ СМАРТФОНОВ */
    @media (max-width: 600px) {
        .cyber-menu-trigger {
            display: block; position: fixed; top: 15px; right: 15px; z-index: 999995;
            background: rgba(4, 10, 18, 0.9); border: 1px solid #00ffcc; color: #00ffcc;
            padding: 10px 14px; font-family: 'Courier New', Courier, monospace; font-size: 12px;
            font-weight: bold; border-radius: 4px; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            cursor: pointer; touch-action: manipulation;
        }
        .cyber-close-btn {
            display: block; position: absolute; top: 15px; right: 15px;
            background: transparent; border: 1px solid #ff007f; color: #ff007f;
            padding: 8px 12px; font-family: 'Courier New', Courier, monospace; font-size: 11px;
            font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        .cyber-nav-deck {
            position: fixed; top: 0; right: -100%; left: auto; transform: none;
            width: 270px; height: 100%; flex-direction: column; justify-content: flex-start;
            align-items: stretch; gap: 35px; padding: 80px 20px 40px 20px;
            border-radius: 0; border: none; border-left: 2px solid #00ffcc;
            background: rgba(3, 8, 15, 0.98); box-shadow: -10px 0 30px rgba(0, 255, 204, 0.2);
            transition: right 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .cyber-nav-deck.open { right: 0; }
        .cyber-links-wrap { flex-direction: column; gap: 14px; }
        .cyber-node { font-size: 14px; padding: 14px 12px; border: 1px solid rgba(0, 255, 204, 0.15); justify-content: flex-start; }
        .cyber-node.active { border-color: #ff007f; }
        .cyber-hud-btn { width: 100%; padding: 14px; font-size: 12px; text-align: center; margin-top: auto; }
    }
    @keyframes cyber-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes matrix-flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.97; } }
</style>

<script>
    (function() {
        const trigger = document.getElementById('menuTrigger');
        const close = document.getElementById('menuClose');
        const deck = document.getElementById('navDeck');
        const hud = document.getElementById('hudTrigger');

        if(trigger && deck) { trigger.addEventListener('click', () => deck.classList.add('open')); }
        if(close && deck) { close.addEventListener('click', () => deck.classList.remove('open')); }
        
        if(hud) {
            hud.addEventListener('click', function(e) {
                e.preventDefault();
                document.body.classList.toggle('hud-active');
                hud.classList.toggle('hud-on');
            });
        }
    })();
</script>
